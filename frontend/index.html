<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solana Wallet Intelligence</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #000000;
        color: #ffffff;
        font-family: "JetBrains Mono", monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .container {
        width: 100%;
        max-width: 420px;
        padding: 1rem;
        text-align: center;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 2rem;
      }

      .input-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 2.5rem;
      }

      .input-row span {
        color: #888888;
      }

      .input-row input {
        background-color: #1a1a1a;
        border: 1px solid #333333;
        color: #ffffff;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.875rem;
        padding: 0.5rem 0.75rem;
        width: 260px;
        outline: none;
      }

      .input-row input::placeholder {
        color: #888888;
      }

      .input-row input:focus {
        border-color: #666666;
      }

      .section {
        text-align: left;
        max-width: 300px;
        margin: 0 auto 2rem auto;
      }

      h2 {
        font-size: 1.125rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }

      .section p {
        color: #888888;
        font-size: 0.875rem;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Solana Wallet Intelligence</h1>

      <div class="input-row">
        <span>$</span>
        <input type="text" placeholder="enter wallet address" />
      </div>

      <div class="section">
        <h2>Wallet Summary</h2>
        <p>Total TX: 124</p>
        <p>DEX Trades: 32</p>
        <p>NFT: 5</p>
      </div>

      <div class="section">
        <h2>Transaction Feed</h2>
        <p>Swap SOL → USDC</p>
        <p>Transfer 2 SOL</p>
        <p>NFT Mint</p>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
